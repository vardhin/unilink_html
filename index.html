<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff4d00" />
  <title>UniLink Wallet Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-signal" viewBox="0 0 24 24"><path d="M4 20v-3M9 20v-7M14 20V9M19 20V4"/></symbol>
    <symbol id="icon-wifi" viewBox="0 0 24 24"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></symbol>
    <symbol id="icon-battery" viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M22 11v2M5 10h11v4H5z"/></symbol>
    <symbol id="icon-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></symbol>
    <symbol id="icon-eye" viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="icon-eye-off" viewBox="0 0 24 24"><path d="m3 3 18 18M10.6 10.7a2 2 0 0 0 2.7 2.7M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a17 17 0 0 1-2.1 3.2M6.6 6.6C3.6 8.5 2 12 2 12s3.5 8 10 8a9.7 9.7 0 0 0 3.4-.6"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="icon-contactless" viewBox="0 0 24 24"><path d="M6 9a4 4 0 0 1 0 6M10 6a8 8 0 0 1 0 12M14 3a12 12 0 0 1 0 18"/></symbol>
    <symbol id="icon-gift" viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13M3 12h18M12 8H7.5a2.5 2.5 0 1 1 0-5C11 3 12 8 12 8Zm0 0h4.5a2.5 2.5 0 1 0 0-5C13 3 12 8 12 8Z"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 10.5 6.8-4M8.6 13.5l6.8 4"/></symbol>
    <symbol id="icon-arrow-left" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>
    <symbol id="icon-smartphone" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M10 18h4"/></symbol>
    <symbol id="icon-card" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></symbol>
    <symbol id="icon-bank" viewBox="0 0 24 24"><path d="m3 10 9-6 9 6M5 10v8M9 10v8M15 10v8M19 10v8M3 20h18"/></symbol>
    <symbol id="icon-trophy" viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 0 1-8 0zM10 13v4M14 13v4M7 21h10M8 6H4v2a4 4 0 0 0 4 4M16 6h4v2a4 4 0 0 1-4 4"/></symbol>
    <symbol id="icon-star" viewBox="0 0 24 24"><path d="m12 2 3 6 7 .9-5 4.8 1.2 6.8L12 17.3l-6.2 3.2L7 13.7 2 8.9 9 8z"/></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></symbol>
    <symbol id="icon-sliders" viewBox="0 0 24 24"><path d="M4 6h6M14 6h6M4 12h10M18 12h2M4 18h3M11 18h9"/><circle cx="12" cy="6" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="9" cy="18" r="2"/></symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24"><path d="M20 15.5A9 9 0 0 1 8.5 4 9 9 0 1 0 20 15.5"/></symbol>
    <symbol id="icon-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></symbol>
    <symbol id="icon-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.8 9a2.5 2.5 0 1 1 3.8 2.1c-1 .6-1.6 1.1-1.6 2.4M12 17h.01"/></symbol>
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9H15v-6H9v6H3z"/></symbol>
    <symbol id="icon-history" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5M12 7v5l3 2"/></symbol>
    <symbol id="icon-shopping-bag" viewBox="0 0 24 24"><path d="M5 8h14l1 13H4zM9 9V6a3 3 0 0 1 6 0v3"/></symbol>
    <symbol id="icon-book-open" viewBox="0 0 24 24"><path d="M3 5a9 9 0 0 1 9 2v14a9 9 0 0 0-9-2zM21 5a9 9 0 0 0-9 2v14a9 9 0 0 1 9-2z"/></symbol>
    <symbol id="icon-book" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5zM4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/></symbol>
    <symbol id="icon-coffee" viewBox="0 0 24 24"><path d="M4 8h13v7a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5zM17 10h1a3 3 0 0 1 0 6h-1M7 2v3M11 2v3M15 2v3"/></symbol>
    <symbol id="icon-printer" viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v7H6z"/></symbol>
    <symbol id="icon-ticket" viewBox="0 0 24 24"><path d="M3 7h18v4a2 2 0 0 0 0 4v4H3v-4a2 2 0 0 0 0-4zM13 7v2M13 12v1M13 16v3"/></symbol>
    <symbol id="icon-utensils" viewBox="0 0 24 24"><path d="M7 3v8M4 3v5a3 3 0 0 0 6 0V3M7 11v10M17 3v18M17 3c-3 2-4 6-4 9h4"/></symbol>
    <symbol id="icon-wallet" viewBox="0 0 24 24"><path d="M4 6h15a2 2 0 0 1 2 2v11H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h13M16 12h5v4h-5a2 2 0 0 1 0-4"/></symbol>
  </svg>
  <main class="phone" aria-label="UniLink app prototype">
    <header class="statusbar">
      <span id="clock">9:41</span>
      <div class="status-icons" aria-hidden="true">
        <svg class="icon"><use href="#icon-signal" /></svg><svg class="icon"><use href="#icon-wifi" /></svg><svg class="icon"><use href="#icon-battery" /></svg>
      </div>
    </header>

    <section id="home" class="screen active">
      <div class="home-head">
        <div><p>Good morning,</p><h1>XXX 👋</h1></div>
        <button class="icon-btn" data-toast="No new notifications" aria-label="Notifications"><svg class="icon"><use href="#icon-bell" /></svg></button>
      </div>

      <article class="balance-card">
        <div class="balance-copy">
          <div class="balance-label">Wallet Balance <button id="toggleBalance" class="plain" aria-label="Show or hide balance"><svg class="icon"><use href="#icon-eye" /></svg></button></div>
          <div class="balance" id="balanceText">₹ 2,450.75</div>
          <button class="primary" data-page="add-money"><svg class="icon"><use href="#icon-plus" /></svg> Add Money</button>
        </div>
        <img src="assets/mascot-transparent.png" class="mascot" alt="Orange UniLink robot mascot" />
      </article>

      <h2>Quick Actions</h2>
      <div class="quick-grid">
        <button class="quick" data-toast="Ready to tap your ID card"><svg class="icon"><use href="#icon-contactless" /></svg>Tap to Pay</button>
        <button class="quick" data-page="add-money"><svg class="icon"><use href="#icon-plus" /></svg>Add Money</button>
        <button class="quick" data-page="rewards"><svg class="icon"><use href="#icon-gift" /></svg>Rewards</button>
        <button class="quick" data-toast="Referral link copied"><svg class="icon"><use href="#icon-share" /></svg>Refer & Earn</button>
      </div>

      <div class="section-title">
        <h2>Recent Transactions</h2>
        <button class="link" data-page="history">View All</button>
      </div>
      <div class="transaction-card" id="recentTransactions"></div>
    </section>

    <section id="add-money" class="screen">
      <div class="page-title"><button class="back" data-page="home" aria-label="Back to home"><svg class="icon"><use href="#icon-arrow-left" /></svg></button><h1>Add Money</h1></div>
      <h2>Select Amount</h2>
      <div class="amount-grid" id="amountGrid">
        <button data-amount="500">₹500</button>
        <button class="selected" data-amount="1000">₹1,000</button>
        <button data-amount="2000">₹2,000</button>
        <button data-amount="3000">₹3,000</button>
        <button data-amount="5000">₹5,000</button>
        <button data-amount="other">Other</button>
      </div>

      <h2>Or Enter Amount</h2>
      <label class="amount-input"><span>₹</span><input id="customAmount" type="number" min="1" value="1000" /></label>

      <h2>Payment Method</h2>
      <div class="method-list" id="methodList">
        <button class="selected" data-method="UPI"><svg class="icon"><use href="#icon-smartphone" /></svg><b>UPI</b><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
        <button data-method="Debit / Credit Card"><svg class="icon"><use href="#icon-card" /></svg><b>Debit / Credit Card</b><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
        <button data-method="Net Banking"><svg class="icon"><use href="#icon-bank" /></svg><b>Net Banking</b><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
      </div>
      <button id="payButton" class="primary wide">Proceed to Pay</button>
    </section>

    <section id="rewards" class="screen">
      <div class="page-title"><button class="back" data-page="home" aria-label="Back to home"><svg class="icon"><use href="#icon-arrow-left" /></svg></button><h1>Rewards</h1></div>
      <div class="points-card">
        <span>Your Points</span>
        <strong><svg class="icon"><use href="#icon-trophy" /></svg> <b id="pointsText">1,250</b></strong>
        <svg class="icon points-star"><use href="#icon-star" /></svg>
      </div>
      <div class="tabs">
        <button class="active" data-reward-tab="all">All</button>
        <button data-reward-tab="available">Available</button>
        <button data-reward-tab="claimed">Claimed</button>
      </div>
      <div id="rewardList" class="reward-list"></div>
      <button id="moreRewards" class="more">View More Rewards <svg class="icon"><use href="#icon-chevron-down" /></svg></button>
    </section>

    <section id="history" class="screen">
      <div class="page-title"><button class="back" data-page="home" aria-label="Back to home"><svg class="icon"><use href="#icon-arrow-left" /></svg></button><h1>Transaction History</h1></div>
      <div class="history-filter">
        <button class="active">All</button><button>Payments</button><button>Top-ups</button>
      </div>
      <div class="transaction-card full" id="allTransactions"></div>
    </section>

    <section id="settings" class="screen">
      <div class="page-title"><button class="back" data-page="home" aria-label="Back to home"><svg class="icon"><use href="#icon-arrow-left" /></svg></button><h1>Profile & Settings</h1></div>

      <button class="profile-card" data-toast="Profile opened">
        <img src="assets/avatar.png" alt="UniLink robot avatar" />
        <span><b>XXX XXX</b><small>xxx@unilink.in</small></span><svg class="icon chevron"><use href="#icon-chevron-right" /></svg>
      </button>

      <h2>Account</h2>
      <div class="settings-card">
        <button data-toast="Personal details opened"><svg class="icon"><use href="#icon-user" /></svg><span>Personal Details</span><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
        <button data-toast="Linked card and bank opened"><svg class="icon"><use href="#icon-card" /></svg><span>Linked Card / Bank</span><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
        <button data-toast="Transaction limits opened"><svg class="icon"><use href="#icon-sliders" /></svg><span>Transaction Limits</span><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
      </div>

      <h2>Preferences</h2>
      <div class="settings-card">
        <div class="setting-row"><svg class="icon"><use href="#icon-bell" /></svg><span>Notifications</span><label class="switch"><input id="notificationToggle" type="checkbox" checked><i></i></label></div>
        <div class="setting-row"><svg class="icon"><use href="#icon-moon" /></svg><span>Dark Mode</span><label class="switch"><input id="darkToggle" type="checkbox"><i></i></label></div>
        <button id="languageButton"><svg class="icon"><use href="#icon-globe" /></svg><span>App Language</span><small>English</small><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
      </div>

      <h2>About</h2>
      <div class="settings-card">
        <button data-toast="Help centre opened"><svg class="icon"><use href="#icon-help" /></svg><span>Help & Support</span><svg class="icon chevron"><use href="#icon-chevron-right" /></svg></button>
      </div>
    </section>

    <nav class="bottom-nav">
      <button class="active" data-page="home"><svg class="icon"><use href="#icon-home" /></svg>Home</button>
      <button data-page="history"><svg class="icon"><use href="#icon-history" /></svg>History</button>
      <button data-page="rewards"><svg class="icon"><use href="#icon-gift" /></svg>Rewards</button>
      <button data-page="settings"><svg class="icon"><use href="#icon-sliders" /></svg>Settings</button>
    </nav>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-box">
        <h3 id="modalTitle">Payment successful</h3>
        <p id="modalText"></p>
        <button id="modalClose" class="primary wide">Done</button>
      </div>
    </div>
    <div id="toast" class="toast"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
